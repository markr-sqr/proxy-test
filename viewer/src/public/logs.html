<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Proxy Log Viewer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'JetBrains Mono', Consolas, monospace;
    background: #0d1117;
    color: #c9d1d9;
    font-size: 13px;
    line-height: 1.5;
  }

  .container {
    max-width: 1400px;
    margin: 0 auto;
    padding: 20px;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
    border-bottom: 1px solid #21262d;
    padding-bottom: 16px;
  }

  header h1 {
    font-size: 20px;
    font-weight: 700;
    color: #e6edf3;
  }

  .auto-refresh {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: #8b949e;
  }

  .auto-refresh input[type="checkbox"] {
    accent-color: #58a6ff;
    cursor: pointer;
  }

  .auto-refresh label { cursor: pointer; }

  /* Filter bar */
  .filters {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    align-items: flex-end;
    margin-bottom: 16px;
    padding: 14px;
    background: #161b22;
    border: 1px solid #21262d;
    border-radius: 6px;
  }

  .filter-group {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .filter-group label {
    font-size: 11px;
    color: #8b949e;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .filter-group input, .filter-group select {
    background: #0d1117;
    border: 1px solid #30363d;
    color: #c9d1d9;
    padding: 6px 10px;
    border-radius: 4px;
    font-family: inherit;
    font-size: 13px;
    width: 140px;
  }

  .filter-group input:focus, .filter-group select:focus {
    outline: none;
    border-color: #58a6ff;
    box-shadow: 0 0 0 2px rgba(88,166,255,0.15);
  }

  .filter-group input[type="datetime-local"] { width: 200px; }

  .btn {
    background: #21262d;
    border: 1px solid #30363d;
    color: #c9d1d9;
    padding: 6px 16px;
    border-radius: 4px;
    font-family: inherit;
    font-size: 13px;
    cursor: pointer;
    transition: background 0.15s;
  }

  .btn:hover { background: #30363d; }

  .btn-primary {
    background: #238636;
    border-color: #2ea043;
    color: #fff;
  }

  .btn-primary:hover { background: #2ea043; }

  /* Summary line */
  .summary {
    margin-bottom: 12px;
    font-size: 12px;
    color: #8b949e;
  }

  /* Table */
  .table-wrap {
    overflow-x: auto;
    border: 1px solid #21262d;
    border-radius: 6px;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    min-width: 900px;
  }

  thead th {
    background: #161b22;
    color: #8b949e;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding: 10px 14px;
    text-align: left;
    border-bottom: 1px solid #21262d;
    position: sticky;
    top: 0;
    white-space: nowrap;
  }

  tbody tr {
    cursor: pointer;
    transition: background 0.1s;
  }

  tbody tr:nth-child(even) { background: #0d1117; }
  tbody tr:nth-child(odd) { background: #161b22; }
  tbody tr:hover { background: #1c2128; }

  tbody td {
    padding: 8px 14px;
    border-bottom: 1px solid #21262d;
    white-space: nowrap;
  }

  /* Expanded detail row */
  tr.detail-row td {
    background: #1c2128;
    padding: 12px 14px 12px 40px;
    white-space: normal;
    cursor: default;
  }

  .risk-detail {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .risk-detail-item {
    display: flex;
    align-items: baseline;
    gap: 8px;
  }

  /* Method pills */
  .method-pill {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 3px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
  }

  .method-GET { background: #1b4332; color: #52c41a; }
  .method-POST { background: #0c2d6b; color: #58a6ff; }
  .method-PUT { background: #3b2e00; color: #d29922; }
  .method-DELETE { background: #3d1418; color: #f85149; }
  .method-PATCH { background: #2e1065; color: #bc8cff; }
  .method-CONNECT { background: #1e1046; color: #a371f7; }
  .method-HEAD { background: #1c2128; color: #8b949e; }
  .method-OPTIONS { background: #1c2128; color: #8b949e; }

  /* Severity badges */
  .severity-badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 3px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
  }

  .severity-HIGH { background: #3d1418; color: #f85149; }
  .severity-MEDIUM { background: #3b2e00; color: #d29922; }
  .severity-LOW { background: #0a2e3d; color: #39d2c0; }

  /* Status */
  .status-ok { color: #52c41a; }
  .status-mitm { color: #d29922; }
  .status-error { color: #f85149; }

  /* Pagination */
  .pagination {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin-top: 16px;
  }

  .page-info {
    font-size: 12px;
    color: #8b949e;
  }

  .btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  /* Payload sections */
  .detail-sections {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .detail-section-title {
    font-size: 12px;
    font-weight: 700;
    color: #e6edf3;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 6px;
    border-bottom: 1px solid #30363d;
    padding-bottom: 4px;
  }

  .payload-request-line {
    font-size: 13px;
    color: #58a6ff;
    background: #0d1117;
    padding: 6px 10px;
    border-radius: 4px;
    margin-bottom: 8px;
    word-break: break-all;
  }

  .payload-headers {
    display: table;
    border-collapse: collapse;
    width: 100%;
    font-size: 12px;
  }

  .payload-header-row {
    display: table-row;
  }

  .payload-header-row > span {
    display: table-cell;
    padding: 3px 10px 3px 0;
    border-bottom: 1px solid #21262d;
  }

  .payload-header-row > span:first-child {
    color: #d29922;
    white-space: nowrap;
    font-weight: 600;
    width: 1%;
  }

  .payload-header-row > span:last-child {
    color: #c9d1d9;
    word-break: break-all;
  }

  .payload-body {
    background: #0d1117;
    padding: 8px 10px;
    border-radius: 4px;
    font-size: 12px;
    white-space: pre-wrap;
    word-break: break-all;
    max-height: 300px;
    overflow-y: auto;
    color: #c9d1d9;
  }

  .payload-body-note {
    font-size: 11px;
    color: #8b949e;
    font-style: italic;
    margin-top: 4px;
  }

  .decoded-section {
    margin-top: 4px;
  }

  .decoded-label {
    font-size: 11px;
    font-weight: 600;
    color: #a371f7;
    margin-bottom: 4px;
  }

  .decoded-content {
    background: #0d1117;
    padding: 8px 10px;
    border-radius: 4px;
    border-left: 3px solid #a371f7;
    font-size: 12px;
    white-space: pre-wrap;
    word-break: break-all;
    max-height: 200px;
    overflow-y: auto;
    color: #c9d1d9;
  }

  /* Content-type badge in table row */
  .content-type-badge {
    display: inline-block;
    padding: 1px 6px;
    border-radius: 3px;
    font-size: 10px;
    background: #1c2128;
    color: #8b949e;
    border: 1px solid #30363d;
    margin-left: 6px;
    vertical-align: middle;
  }

  .content-type-badge.ct-image {
    background: #1e3a2f;
    color: #3fb950;
    border-color: #238636;
  }

  .content-type-badge.ct-binary {
    background: #2d1b00;
    color: #d29922;
    border-color: #9e6a03;
  }

  /* Image preview in detail row */
  .payload-image-preview {
    margin-top: 8px;
    padding: 10px;
    background: #0d1117;
    border-radius: 4px;
    text-align: center;
  }

  .payload-image-preview img {
    max-width: 100%;
    max-height: 400px;
    border: 1px solid #30363d;
    border-radius: 4px;
  }

  .payload-image-preview .img-label {
    font-size: 11px;
    color: #8b949e;
    margin-top: 6px;
  }

  /* Empty / loading */
  .empty-state {
    text-align: center;
    padding: 40px;
    color: #484f58;
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>Proxy Log Viewer</h1>
    <div class="auto-refresh">
      <input type="checkbox" id="auto-refresh">
      <label for="auto-refresh">Auto-refresh (5s)</label>
    </div>
  </header>

  <form class="filters" id="filter-form">
    <div class="filter-group">
      <label for="f-method">Method</label>
      <select id="f-method">
        <option value="">All</option>
        <option>GET</option>
        <option>POST</option>
        <option>PUT</option>
        <option>DELETE</option>
        <option>PATCH</option>
        <option>CONNECT</option>
        <option>HEAD</option>
        <option>OPTIONS</option>
      </select>
    </div>
    <div class="filter-group">
      <label for="f-url">URL</label>
      <input type="text" id="f-url" placeholder="e.g. example.com">
    </div>
    <div class="filter-group">
      <label for="f-severity">Severity</label>
      <select id="f-severity">
        <option value="">All</option>
        <option>HIGH</option>
        <option>MEDIUM</option>
        <option>LOW</option>
      </select>
    </div>
    <div class="filter-group">
      <label for="f-start">Start</label>
      <input type="datetime-local" id="f-start">
    </div>
    <div class="filter-group">
      <label for="f-end">End</label>
      <input type="datetime-local" id="f-end">
    </div>
    <button type="submit" class="btn btn-primary">Search</button>
    <button type="button" class="btn" id="clear-filters">Clear</button>
  </form>

  <div class="summary" id="summary"></div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Timestamp</th>
          <th>Client</th>
          <th>Method</th>
          <th>Target</th>
          <th>Status</th>
          <th>Risks</th>
        </tr>
      </thead>
      <tbody id="log-body">
        <tr><td colspan="6" class="empty-state">Loading...</td></tr>
      </tbody>
    </table>
  </div>

  <div class="pagination" id="pagination" style="display:none">
    <button class="btn" id="prev-btn">Prev</button>
    <span class="page-info" id="page-info"></span>
    <button class="btn" id="next-btn">Next</button>
  </div>
</div>

<script>
(function() {
  const LIMIT = 50;
  let currentPage = 1;
  let totalEntries = 0;
  let refreshTimer = null;

  const $body      = document.getElementById('log-body');
  const $summary   = document.getElementById('summary');
  const $pagination = document.getElementById('pagination');
  const $pageInfo  = document.getElementById('page-info');
  const $prevBtn   = document.getElementById('prev-btn');
  const $nextBtn   = document.getElementById('next-btn');
  const $form      = document.getElementById('filter-form');
  const $autoRef   = document.getElementById('auto-refresh');
  const $clearBtn  = document.getElementById('clear-filters');

  function getFilters() {
    const params = new URLSearchParams();
    const method = document.getElementById('f-method').value;
    const url    = document.getElementById('f-url').value.trim();
    const sev    = document.getElementById('f-severity').value;
    const start  = document.getElementById('f-start').value;
    const end    = document.getElementById('f-end').value;
    if (method) params.set('method', method);
    if (url)    params.set('url', url);
    if (sev)    params.set('severity', sev);
    if (start)  params.set('start', new Date(start).toISOString());
    if (end)    params.set('end', new Date(end).toISOString());
    return params;
  }

  function statusClass(status) {
    if (status === '200' || status === '204') return 'status-ok';
    if (status === 'MITM' || status === 'mitm') return 'status-mitm';
    const code = parseInt(status, 10);
    if (code >= 400) return 'status-error';
    if (code >= 200 && code < 300) return 'status-ok';
    return 'status-mitm';
  }

  function escapeHtml(str) {
    const el = document.createElement('span');
    el.textContent = str;
    return el.innerHTML;
  }

  function renderRiskBadges(risks) {
    if (!risks || risks.length === 0) {
      return '<span style="color:#484f58">-</span>';
    }
    return risks.map(function(r) {
      return '<span class="severity-badge severity-' + escapeHtml(r.severity) + '">' +
             escapeHtml(r.severity) + '</span>';
    }).join(' ');
  }

  function getContentType(entry) {
    var p = entry.payload;
    if (!p || !p.headers) return '';
    for (var i = 0; i < p.headers.length; i++) {
      if (p.headers[i][0].toLowerCase() === 'content-type') {
        return p.headers[i][1];
      }
    }
    return '';
  }

  function renderContentTypeBadge(entry) {
    var ct = getContentType(entry);
    if (!ct) return '';
    var short = ct.split(';')[0].trim();
    var cls = 'content-type-badge';
    if (short.indexOf('image/') === 0) cls += ' ct-image';
    else if (entry.payload && entry.payload.body_is_binary) cls += ' ct-binary';
    return '<span class="' + cls + '">' + escapeHtml(short) + '</span>';
  }

  function isImageContentType(ct) {
    return ct && ct.split(';')[0].trim().indexOf('image/') === 0;
  }

  function tryDecodeEncodings(bodyStr, isBinary) {
    var results = [];
    if (!bodyStr) return results;

    // Binary body → hex dump
    if (isBinary) {
      try {
        var raw = atob(bodyStr);
        var hex = [];
        for (var i = 0; i < raw.length; i++) {
          hex.push(('0' + raw.charCodeAt(i).toString(16)).slice(-2));
        }
        results.push({ label: 'Binary (hex dump)', decoded: hex.join(' ') });
      } catch(e) {}
      return results;
    }

    // URL-encoded form data
    if (/^[a-zA-Z0-9_.~%+-]+=/.test(bodyStr) && bodyStr.indexOf('&') !== -1) {
      try {
        var params = new URLSearchParams(bodyStr);
        var lines = [];
        params.forEach(function(v, k) { lines.push(k + ' = ' + v); });
        if (lines.length > 0) {
          results.push({ label: 'URL-encoded form data', decoded: lines.join('\n') });
        }
      } catch(e) {}
    }

    // JWT detection (eyJ prefix with dot-separated parts)
    var jwtMatch = bodyStr.match(/eyJ[A-Za-z0-9_-]+\.eyJ[A-Za-z0-9_-]+(?:\.[A-Za-z0-9_-]*)?/);
    if (jwtMatch) {
      try {
        var jwtParts = jwtMatch[0].split('.');
        var header = JSON.parse(atob(jwtParts[0].replace(/-/g,'+').replace(/_/g,'/')));
        var payload = JSON.parse(atob(jwtParts[1].replace(/-/g,'+').replace(/_/g,'/')));
        results.push({
          label: 'JWT decoded',
          decoded: 'Header: ' + JSON.stringify(header, null, 2) + '\nPayload: ' + JSON.stringify(payload, null, 2)
        });
      } catch(e) {}
    }

    // Base64 detection (20+ chars of valid base64, not already decoded as JWT)
    if (!jwtMatch && /^[A-Za-z0-9+/]{20,}={0,2}$/.test(bodyStr.trim())) {
      try {
        var decoded = atob(bodyStr.trim());
        // Check if result is printable text
        var printable = true;
        for (var i = 0; i < decoded.length; i++) {
          var c = decoded.charCodeAt(i);
          if (c < 32 && c !== 9 && c !== 10 && c !== 13) { printable = false; break; }
        }
        if (printable) {
          results.push({ label: 'Base64 decoded (text)', decoded: decoded });
        } else {
          var hex = [];
          for (var j = 0; j < decoded.length; j++) {
            hex.push(('0' + decoded.charCodeAt(j).toString(16)).slice(-2));
          }
          results.push({ label: 'Base64 decoded (hex)', decoded: hex.join(' ') });
        }
      } catch(e) {}
    }

    // Hex-encoded detection (20+ even-length hex chars)
    if (/^[0-9a-fA-F]{20,}$/.test(bodyStr.trim()) && bodyStr.trim().length % 2 === 0) {
      try {
        var hexStr = bodyStr.trim();
        var text = '';
        var allPrintable = true;
        for (var k = 0; k < hexStr.length; k += 2) {
          var ch = parseInt(hexStr.substr(k, 2), 16);
          if (ch < 32 && ch !== 9 && ch !== 10 && ch !== 13) allPrintable = false;
          text += String.fromCharCode(ch);
        }
        if (allPrintable) {
          results.push({ label: 'Hex decoded (text)', decoded: text });
        }
      } catch(e) {}
    }

    return results;
  }

  function renderDetailRow(entry, colSpan) {
    var tr = document.createElement('tr');
    tr.className = 'detail-row';
    var td = document.createElement('td');
    td.colSpan = colSpan;
    var html = '<div class="detail-sections">';

    // Risks section
    if (entry.risks && entry.risks.length > 0) {
      html += '<div><div class="detail-section-title">Risks</div>';
      html += '<div class="risk-detail">';
      entry.risks.forEach(function(r) {
        html += '<div class="risk-detail-item">' +
                '<span class="severity-badge severity-' + escapeHtml(r.severity) + '">' +
                escapeHtml(r.severity) + '</span> ' +
                '<span>' + escapeHtml(r.description) + '</span></div>';
      });
      html += '</div></div>';
    }

    // Payload section
    var p = entry.payload;
    if (p) {
      html += '<div><div class="detail-section-title">Request Payload</div>';
      html += '<div class="payload-request-line">' + escapeHtml(p.request_line) + '</div>';

      if (p.headers && p.headers.length > 0) {
        html += '<div class="payload-headers">';
        p.headers.forEach(function(h) {
          html += '<div class="payload-header-row"><span>' + escapeHtml(h[0]) + ':</span><span>' + escapeHtml(h[1]) + '</span></div>';
        });
        html += '</div>';
      }

      if (p.body) {
        var ct = getContentType(entry);
        var isImage = isImageContentType(ct);

        // Image preview
        if (isImage && p.body_is_binary) {
          var mimeType = ct.split(';')[0].trim();
          html += '<div style="margin-top:8px"><div class="detail-section-title">Image Preview</div>';
          html += '<div class="payload-image-preview">' +
                  '<img src="data:' + escapeHtml(mimeType) + ';base64,' + escapeHtml(p.body) + '" alt="Request image payload">' +
                  '<div class="img-label">' + escapeHtml(mimeType) + ' (' + p.body.length + ' bytes base64)</div>' +
                  '</div></div>';
        }

        // Also check for base64 image in text body (data URI pattern or known b64 image signatures)
        if (!isImage && !p.body_is_binary) {
          // PNG signature in base64 starts with iVBORw0KGgo, JPEG with /9j/, GIF with R0lGOD
          var b64ImgMatch = null;
          if (p.body.indexOf('iVBORw0KGgo') === 0) b64ImgMatch = 'image/png';
          else if (p.body.indexOf('/9j/') === 0) b64ImgMatch = 'image/jpeg';
          else if (p.body.indexOf('R0lGOD') === 0) b64ImgMatch = 'image/gif';

          if (b64ImgMatch) {
            html += '<div style="margin-top:8px"><div class="detail-section-title">Image Preview (base64-encoded body)</div>';
            html += '<div class="payload-image-preview">' +
                    '<img src="data:' + b64ImgMatch + ';base64,' + escapeHtml(p.body) + '" alt="Base64-encoded image">' +
                    '<div class="img-label">' + b64ImgMatch + ' (detected from base64 signature)</div>' +
                    '</div></div>';
          }
        }

        html += '<div style="margin-top:8px"><div class="detail-section-title">Body' +
                (p.body_is_binary ? ' (binary, base64-encoded)' : '') + '</div>';
        html += '<div class="payload-body">' + escapeHtml(p.body) + '</div>';
        if (p.body_truncated) {
          html += '<div class="payload-body-note">Body truncated to 8 KB</div>';
        }
        html += '</div>';

        // Decoded data
        var decodings = tryDecodeEncodings(p.body, p.body_is_binary);
        if (decodings.length > 0) {
          html += '<div style="margin-top:8px"><div class="detail-section-title">Decoded Data</div>';
          decodings.forEach(function(d) {
            html += '<div class="decoded-section">' +
                    '<div class="decoded-label">' + escapeHtml(d.label) + '</div>' +
                    '<div class="decoded-content">' + escapeHtml(d.decoded) + '</div></div>';
          });
          html += '</div>';
        }
      }
      html += '</div>';
    }

    if ((!entry.risks || entry.risks.length === 0) && !p) {
      html += '<div style="color:#484f58">No risks detected. No payload captured.</div>';
    }

    html += '</div>';
    td.innerHTML = html;
    tr.appendChild(td);
    return tr;
  }

  function render(data) {
    totalEntries = data.total;
    var entries = data.entries;
    var start = (data.page - 1) * data.limit + 1;
    var end = Math.min(data.page * data.limit, data.total);
    var totalPages = Math.max(1, Math.ceil(data.total / data.limit));

    if (data.total === 0) {
      $summary.textContent = 'No entries found.';
    } else {
      $summary.textContent = 'Showing ' + start + '\u2013' + end + ' of ' + data.total + ' entries';
    }

    $body.innerHTML = '';

    if (entries.length === 0) {
      $body.innerHTML = '<tr><td colspan="6" class="empty-state">No log entries match your filters.</td></tr>';
      $pagination.style.display = 'none';
      return;
    }

    entries.forEach(function(entry) {
      var tr = document.createElement('tr');
      tr.innerHTML =
        '<td>' + escapeHtml(entry.timestamp) + '</td>' +
        '<td>' + escapeHtml(entry.client_ip + ':' + entry.client_port) + '</td>' +
        '<td><span class="method-pill method-' + escapeHtml(entry.method) + '">' +
             escapeHtml(entry.method) + '</span>' + renderContentTypeBadge(entry) + '</td>' +
        '<td>' + escapeHtml(entry.target) + '</td>' +
        '<td><span class="' + statusClass(entry.status) + '">' +
             escapeHtml(entry.status) + '</span></td>' +
        '<td>' + renderRiskBadges(entry.risks) + '</td>';

      tr.addEventListener('click', function() {
        var next = tr.nextElementSibling;
        if (next && next.classList.contains('detail-row')) {
          next.remove();
        } else {
          var detail = renderDetailRow(entry, 6);
          tr.parentNode.insertBefore(detail, tr.nextSibling);
        }
      });

      $body.appendChild(tr);
    });

    $pagination.style.display = 'flex';
    $pageInfo.textContent = 'Page ' + data.page + ' of ' + totalPages;
    $prevBtn.disabled = data.page <= 1;
    $nextBtn.disabled = data.page >= totalPages;
  }

  function fetchLogs() {
    var params = getFilters();
    params.set('page', String(currentPage));
    params.set('limit', String(LIMIT));

    fetch('/api/logs?' + params.toString())
      .then(function(res) { return res.json(); })
      .then(render)
      .catch(function(err) {
        $body.innerHTML = '<tr><td colspan="6" class="empty-state">Error loading logs: ' +
                          escapeHtml(String(err)) + '</td></tr>';
      });
  }

  $form.addEventListener('submit', function(e) {
    e.preventDefault();
    currentPage = 1;
    fetchLogs();
  });

  $clearBtn.addEventListener('click', function() {
    document.getElementById('f-method').value = '';
    document.getElementById('f-url').value = '';
    document.getElementById('f-severity').value = '';
    document.getElementById('f-start').value = '';
    document.getElementById('f-end').value = '';
    currentPage = 1;
    fetchLogs();
  });

  $prevBtn.addEventListener('click', function() {
    if (currentPage > 1) { currentPage--; fetchLogs(); }
  });

  $nextBtn.addEventListener('click', function() {
    var totalPages = Math.ceil(totalEntries / LIMIT);
    if (currentPage < totalPages) { currentPage++; fetchLogs(); }
  });

  $autoRef.addEventListener('change', function() {
    if ($autoRef.checked) {
      refreshTimer = setInterval(fetchLogs, 5000);
    } else {
      clearInterval(refreshTimer);
      refreshTimer = null;
    }
  });

  fetchLogs();
})();
</script>
</body>
</html>
