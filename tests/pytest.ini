[pytest]
testpaths = smoke regression
markers =
    smoke: Smoke tests (fast, run first)
    regression: Regression tests (comprehensive)
    ui: Playwright UI tests (requires browser)
timeout = 120

# Default report outputs (can be overridden via CLI)
addopts =
    --junitxml=reports/junit.xml
    --html=reports/report.html
    --self-contained-html
